<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Github Issue Tracker Login</title>
<!-- tailwindcss and css  -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- css link  -->
<link rel="stylesheet" href="./style.css">
</head>

<body>
<!-- Login Section -->
<div class="min-h-screen flex items-center justify-center bg-gray-100">
<div class="bg-white p-8 rounded-lg shadow w-96">
<h2 class="text-2xl font-bold text-center mb-2">GitHub Issues Tracker</h2>
<p class="text-center text-gray-500 mb-6">Sign in to manage your issues</p>
<input id="username"type="text"placeholder="Enter Username"class="input input-bordered w-full mb-4">
<input id="password"type="password"placeholder="Enter Password"class="input input-bordered w-full mb-4">
<button type="button" onclick="login()" class="btn btn-primary w-full">Sign In</button>

</div>

</div>

<script src="./login.js"></script>
</body>
</html>
