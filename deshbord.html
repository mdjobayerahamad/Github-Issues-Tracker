<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Github Issues Tracker</title>
<!-- Tailwind + DaisyUI -->
<link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
<!-- css link  -->
<link rel="stylesheet" href="./style.css">
</head>

<body class="bg-gray-100">

<!-- Navbar -->
<div class="navbar bg-white shadow px-6">

<div class="flex-1">
<h1 class="text-xl font-bold">
Github Issues Tracker
</h1>
</div>

<div class="flex gap-2">
<input
id="searchInput"
type="text"
placeholder="Search issues"
class="input input-bordered"
/>

<button id="searchBtn" class="btn btn-primary">
Search
</button>
</div>

</div>


<!-- Main Section -->

<div class="max-w-7xl mx-auto mt-8 px-4">

<!-- Tabs -->

<div class="tabs tabs-boxed mb-6">

<button id="allTab" class="tab tab-active">
All
</button>

<button id="openTab" class="tab">
Open
</button>

<button id="closedTab" class="tab">
Closed
</button>

</div>


<!-- Issue Container -->

<div
id="issue-container"
class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"
>

<!-- Issue cards API থেকে এখানে আসবে -->

</div>

</div>


<script src="./deshbord.js"></script>

</body>
</html>
